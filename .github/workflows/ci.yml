name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-and-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm audit --omit=dev

  desktop-core:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml
